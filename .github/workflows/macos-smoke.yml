name: macos-product-smoke

on:
  push:
    branches: [main]
    paths:
      - "RUN_VITALSSIGHT_MAC.command"
      - "requirements-core.txt"
      - "app/**"
      - "src/**"
      - "scripts/run_vitalssight_local.py"
      - "scripts/setup_runtime_assets.py"
      - ".github/workflows/macos-smoke.yml"
  pull_request:
    paths:
      - "RUN_VITALSSIGHT_MAC.command"
      - "requirements-core.txt"
      - "app/**"
      - "src/**"
      - "scripts/run_vitalssight_local.py"
      - "scripts/setup_runtime_assets.py"
      - ".github/workflows/macos-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Validate macOS launcher syntax and mode
        run: |
          bash -n RUN_VITALSSIGHT_MAC.command
          test -x RUN_VITALSSIGHT_MAC.command
      - name: Run the exact macOS launcher path
        run: ./RUN_VITALSSIGHT_MAC.command --smoke-test --no-browser --startup-timeout 180
      - name: Install test dependency in the launcher environment
        run: ./.venv-macos/bin/python -m pip install -r requirements-dev.txt
      - name: Run public contract tests
        run: ./.venv-macos/bin/python -m pytest -q
