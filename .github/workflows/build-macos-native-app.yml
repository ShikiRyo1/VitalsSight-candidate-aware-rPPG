name: build-macos-native-app

on:
  push:
    branches:
      - main
      - agent/macos-native-app
    paths:
      - "app/**"
      - "src/**"
      - "configs/**"
      - "knowledge/**"
      - "reproducibility/**"
      - "packaging/macos_launcher.py"
      - "packaging/build_macos_app.py"
      - "scripts/setup_runtime_assets.py"
      - "requirements-core.txt"
      - ".github/workflows/build-macos-native-app.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }} native application
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            label: AppleSilicon
            machine: arm64
          - runner: macos-15-intel
            label: Intel
            machine: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify runner architecture
        shell: bash
        run: |
          test "$(uname -m)" = "${{ matrix.machine }}"
          sw_vers
          python -VV

      - name: Install build and application dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-core.txt
          python -m pip install "pyinstaller==6.21.0" "pillow>=10,<12"

      - name: Install and verify pinned runtime asset
        run: python scripts/setup_runtime_assets.py

      - name: Build ad-hoc signed native application
        run: python packaging/build_macos_app.py --output-root build/macos

      - name: Verify architecture and code signature
        shell: bash
        run: |
          APP="build/macos/dist/VitalsSight.app"
          test -d "$APP"
          file "$APP/Contents/MacOS/VitalsSight" | tee build/macos/executable_architecture.txt
          file "$APP/Contents/MacOS/VitalsSight" | grep "${{ matrix.machine }}"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Launch packaged UI and API smoke test
        shell: bash
        run: |
          APP="build/macos/dist/VitalsSight.app"
          "$APP/Contents/MacOS/VitalsSight" --smoke-test --no-browser
          RESULT="$HOME/Library/Application Support/VitalsSightResearchDemo/native_app_smoke_test.json"
          test -f "$RESULT"
          cat "$RESULT"
          python - "$RESULT" <<'PY'
          import json, pathlib, sys
          payload = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert payload["status"] == "PASS", payload
          assert payload["architecture"] == "${{ matrix.machine }}", payload
          assert payload["ui"].startswith("http://127.0.0.1:"), payload
          assert payload["api"].startswith("http://127.0.0.1:"), payload
          PY
          cp "$RESULT" "build/macos/native_app_smoke_${{ matrix.label }}.json"

      - name: Validate delivery ZIP
        shell: bash
        run: |
          ZIP=$(find build/macos/delivery -maxdepth 1 -name 'VitalsSight_macOS_${{ matrix.label }}_*.zip' -print -quit)
          test -n "$ZIP"
          unzip -t "$ZIP"
          shasum -a 256 "$ZIP"

      - name: Upload tested macOS delivery
        uses: actions/upload-artifact@v4
        with:
          name: VitalsSight-macOS-${{ matrix.label }}
          path: |
            build/macos/delivery/VitalsSight_macOS_${{ matrix.label }}_*.zip
            build/macos/delivery/SHA256_${{ matrix.label }}.txt
            build/macos/native_app_smoke_${{ matrix.label }}.json
            build/macos/executable_architecture.txt
          if-no-files-found: error
          retention-days: 30
